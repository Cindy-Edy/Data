<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sindi - Virtual Assistant</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
        }
        .assistant {
            background-color: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }
        .assistant h1 {
            color: #3c40c6;
            font-size: 24px;
        }
        .status {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
        .mic-button {
            background-color: #3c40c6;
            color: white;
            border: none;
            border-radius: 50%;
            padding: 15px;
            font-size: 20px;
            cursor: pointer;
        }
        .mic-button:active {
            background-color: #575fcf;
        }
    </style>
</head>
<body>

<div class="assistant">
    <h1>Sindi</h1>
    <button class="mic-button" onclick="startListening()">🎤</button>
    <div class="status">Klik untuk memulai...</div>
</div>

<script>
    const synth = window.speechSynthesis;
    let recognition;
    let isSindiActive = false; // Status apakah asisten Sindi telah aktif
    
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'id-ID';
        recognition.continuous = true; // Agar mendengarkan terus menerus
        recognition.interimResults = false;
        
        recognition.onstart = function() {
            document.querySelector('.status').textContent = "Mendengarkan...";
        };
        
        recognition.onresult = function(event) {
            const result = event.results[event.resultIndex][0].transcript.toLowerCase();
            document.querySelector('.status').textContent = "Anda mengatakan: " + result;
            
            // Cek apakah Sindi sudah diaktifkan atau memerlukan aktivasi
            if (!isSindiActive && result.includes("sindi")) {
                isSindiActive = true;
                speak("Ya, ada yang bisa saya bantu?");
            } else if (isSindiActive) {
                processCommand(result); // Proses perintah setelah aktivasi
            } else {
                document.querySelector('.status').textContent = "Panggil 'Sindi' untuk mulai.";
                speak("Panggil Sindi jika ingin berbicara.");
            }
        };
        
        recognition.onerror = function(event) {
            console.error("Kesalahan pengenalan suara: ", event.error);
            document.querySelector('.status').textContent = "Ada masalah dengan pengenalan suara.";
        };
        
        recognition.onend = function() {
            document.querySelector('.status').textContent = "Klik untuk memulai lagi...";
        };
    } else {
        document.querySelector('.status').textContent = "Browser tidak mendukung pengenalan suara.";
    }

    function startListening() {
        if (recognition) {
            recognition.start();
        }
    }

    function processCommand(command) {
        if (command.includes("buka google")) {
            speak("Membuka Google.");
            window.open("https://www.google.com", "_blank");
        } else if (command.includes("buka youtube")) {
            speak("Membuka YouTube.");
            window.open("https://www.youtube.com", "_blank");
        } else if (command.includes("cari")) {
            const searchQuery = command.replace("cari", "").trim();
            speak("Mencari " + searchQuery + " di Google.");
            window.open(`https://www.google.com/search?q=${searchQuery}`, "_blank");
        } else if (command.includes("putar musik")) {
            speak("Memutar musik di YouTube.");
            window.open("https://www.youtube.com/results?search_query=musik", "_blank");
        } else if (command.includes("waktu")) {
            const time = new Date().toLocaleTimeString();
            speak("Sekarang jam " + time);
        } else if (command.includes("tanggal")) {
            const date = new Date().toLocaleDateString();
            speak("Hari ini tanggal " + date);
        } else if (command.includes("cuaca")) {
            speak("Fitur cuaca belum tersedia.");
        } else if (command.includes("buka kalender")) {
            speak("Membuka Google Kalender.");
            window.open("https://calendar.google.com", "_blank");
        } else if (command.includes("siapa namaku")) {
            speak("Nama kamu adalah Edy Sahputra.");
        } else if (command.includes("sapa saya")) {
            speak("Halo Edy, bagaimana kabarmu hari ini?");
        } else {
            speak("Perintah tidak dikenal.");
        }
    }

    function speak(text) {
        const utterThis = new SpeechSynthesisUtterance(text);
        synth.speak(utterThis);
    }
</script>

</body>
</html>
