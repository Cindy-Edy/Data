<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sindi - Virtual Assistant</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
        }
        .assistant {
            background-color: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }
        .assistant h1 {
            color: #3c40c6;
            font-size: 24px;
        }
        .status {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
        .mic-button {
            background-color: #3c40c6;
            color: white;
            border: none;
            border-radius: 50%;
            padding: 15px;
            font-size: 20px;
            cursor: pointer;
        }
        .mic-button:active {
            background-color: #575fcf;
        }
    </style>
</head>
<body>

<div class="assistant">
    <h1>Sindi</h1>
    <button class="mic-button" onclick="startListening()">🎤</button>
    <div class="status">Klik untuk memulai...</div>
</div>

<script>
    const synth = window.speechSynthesis;
    let recognition;
    
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'id-ID';
        recognition.continuous = false;
        recognition.interimResults = false;
        
        recognition.onstart = function() {
            document.querySelector('.status').textContent = "Mendengarkan...";
        };
        
        recognition.onresult = function(event) {
            const result = event.results[0][0].transcript.toLowerCase();
            document.querySelector('.status').textContent = "Anda mengatakan: " + result;
            if (result.includes("sindi")) {
                const command = result.replace("sindi", "").trim(); // Hilangkan kata 'Sindi' dari perintah
                processCommand(command);
            } else {
                document.querySelector('.status').textContent = "Panggil 'Sindi' untuk mulai.";
                speak("Panggil Sindi jika ingin berbicara.");
            }
        };
        
        recognition.onerror = function() {
            document.querySelector('.status').textContent = "Ada masalah dengan pengenalan suara.";
        };
        
        recognition.onend = function() {
            document.querySelector('.status').textContent = "Klik untuk memulai lagi...";
        };
    } else {
        document.querySelector('.status').textContent = "Browser tidak mendukung pengenalan suara.";
    }

    function startListening() {
        if (recognition) {
            recognition.start();
        }
    }

    function processCommand(command) {
        if (command.includes("buka google")) {
            speak("Membuka Google.");
            window.open("https://www.google.com", "_blank");
        } else if (command.includes("waktu")) {
            const time = new Date().toLocaleTimeString();
            speak("Sekarang jam " + time);
        } else if (command.includes("cuaca")) {
            speak("Fitur cuaca belum tersedia.");
        } else {
            speak("Perintah tidak dikenal.");
        }
    }

    function speak(text) {
        const utterThis = new SpeechSynthesisUtterance(text);
        synth.speak(utterThis);
    }
</script>

</body>
</html>
